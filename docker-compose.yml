services:
  postgresdb:
    image: postgres:16-alpine
    container_name: hotel_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_local_dev
      PGUSER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_local_dev"]
      interval: 5s
      timeout: 5s
      retries: 8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
volumes:
  postgres_data: